name: Commit to Main Repository

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  commit-to-main:
    name: Commit to Main Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository (current repository)
        uses: actions/checkout@v3
        with:
          path: source-repo

      - name: Get tag version
        id: version
        run: |
          cd source-repo
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout target repository (costrict-enterprise)
        uses: actions/checkout@v3
        with:
          repository: zgsm-ai/costrict-enterprise
          token: ${{ secrets.PAT_TOKEN }}
          path: target-repo

      - name: Determine target directory
        id: target_dir
        run: |
          cd target-repo
          if [ -n "${{ secrets.MAIN_DIRECTORY }}" ]; then
            TARGET_DIR="${{ secrets.MAIN_DIRECTORY }}"
          else
            TARGET_DIR="services/${{ github.event.repository.name }}"
          fi
          echo "target_dir=$TARGET_DIR" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove existing content in target directory
        run: |
          cd target-repo
          if [ -d "${{ steps.target_dir.outputs.target_dir }}" ]; then
            rm -rf "${{ steps.target_dir.outputs.target_dir }}"
          fi

      - name: Copy source repository content to target directory
        run: |
          mkdir -p "target-repo/${{ steps.target_dir.outputs.target_dir }}"
          cp -r source-repo/* "target-repo/${{ steps.target_dir.outputs.target_dir }}/" 2>/dev/null || true
          cp -r source-repo/.[!.]* "target-repo/${{ steps.target_dir.outputs.target_dir }}/" 2>/dev/null || true

      - name: Commit and push changes
        run: |
          cd target-repo
          git add -A
          git diff --staged --quiet || git commit -m "chore: update ${{ github.event.repository.name }} to ${{ steps.version.outputs.version }}"
          git push origin main

